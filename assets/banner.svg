<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19"/>
      <stop offset="50%" stop-color="#0f1420"/>
      <stop offset="100%" stop-color="#0b0f19"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bgGrad)"/>
  <circle cx="1000" cy="90" r="220" fill="url(#glow)"/>
  <circle cx="140" cy="250" r="160" fill="url(#glow)"/>

  <!-- neural network motif, right side -->
  <g stroke="#334155" stroke-width="1" opacity="0.7">
    <line x1="850" y1="60" x2="950" y2="40"/>
    <line x1="850" y1="60" x2="950" y2="100"/>
    <line x1="850" y1="130" x2="950" y2="40"/>
    <line x1="850" y1="130" x2="950" y2="100"/>
    <line x1="850" y1="130" x2="950" y2="160"/>
    <line x1="950" y1="40" x2="1050" y2="70"/>
    <line x1="950" y1="100" x2="1050" y2="70"/>
    <line x1="950" y1="100" x2="1050" y2="140"/>
    <line x1="950" y1="160" x2="1050" y2="140"/>
    <line x1="1050" y1="70" x2="1130" y2="95"/>
    <line x1="1050" y1="140" x2="1130" y2="95"/>
  </g>
  <g fill="#38bdf8">
    <circle cx="850" cy="60" r="4"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="130" r="4"><animate attributeName="opacity" values="1;0.3;1" dur="2.1s" repeatCount="indefinite"/></circle>
  </g>
  <g fill="#a78bfa">
    <circle cx="950" cy="40" r="4"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="950" cy="100" r="4"><animate attributeName="opacity" values="1;0.4;1" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="950" cy="160" r="4"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/></circle>
  </g>
  <g fill="#818cf8">
    <circle cx="1050" cy="70" r="4"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="140" r="4"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
  </g>
  <circle cx="1130" cy="95" r="5" fill="#38bdf8"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite"/></circle>

  <!-- dotted grid accent, left -->
  <g fill="#475569" opacity="0.6">
    <circle cx="60" cy="40" r="2"/><circle cx="80" cy="40" r="2"/><circle cx="100" cy="40" r="2"/>
    <circle cx="60" cy="60" r="2"/><circle cx="80" cy="60" r="2"/><circle cx="100" cy="60" r="2"/>
    <circle cx="60" cy="80" r="2"/><circle cx="80" cy="80" r="2"/><circle cx="100" cy="80" r="2"/>
  </g>

  <!-- thin divider line -->
  <line x1="60" y1="235" x2="700" y2="235" stroke="#334155" stroke-width="1"/>

  <text x="60" y="120" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="url(#titleGrad)" letter-spacing="1">OM BANKAR</text>
  <text x="60" y="160" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#cbd5e1" letter-spacing="3">AI &amp; DATA SCIENCE ENGINEERING STUDENT</text>
  <text x="60" y="195" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#94a3b8">Building Generative AI &amp; LLM applications with RAG, LangChain &amp; Python</text>

  <!-- pill tags -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">
    <rect x="60" y="250" width="70" height="28" rx="14" fill="#111827" stroke="#4f46e5"/>
    <text x="95" y="268" fill="#a5b4fc" text-anchor="middle">GenAI</text>

    <rect x="140" y="250" width="90" height="28" rx="14" fill="#111827" stroke="#0ea5e9"/>
    <text x="185" y="268" fill="#7dd3fc" text-anchor="middle">LLM · RAG</text>

    <rect x="240" y="250" width="80" height="28" rx="14" fill="#111827" stroke="#8b5cf6"/>
    <text x="280" y="268" fill="#c4b5fd" text-anchor="middle">Python</text>

    <rect x="330" y="250" width="100" height="28" rx="14" fill="#111827" stroke="#22c55e"/>
    <text x="380" y="268" fill="#86efac" text-anchor="middle">LangChain</text>
  </g>
</svg>
